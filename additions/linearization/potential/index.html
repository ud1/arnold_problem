<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Line Configuration Viewer</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fcfaf7;
      --ink: #000000;
      --muted: #000000;
      --accent: #0f766e;
      --line: #c9beb0;
      --black: #0f0f10;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1400px 800px at 0% 100%, #ebe3d5 0%, transparent 70%),
        radial-gradient(1200px 700px at 100% 0%, #e4efe8 0%, transparent 62%),
        var(--bg);
    }
    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 380px;
      gap: 0;
      padding: 0;
    }
    .viewer {
      border: none;
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      min-height: 300px;
      position: relative;
    }
    .panel {
      border: none;
      border-radius: 0;
      background: #ece9e3;
      padding: 12px;
      overflow: auto;
    }
    .section {
      margin: 0 0 10px 0;
    }
    .section:last-child { margin-bottom: 0; }
    .section h2 {
      margin: 8px 0 4px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .section-head-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      padding: 8px;
      background: #fff;
      color: var(--ink);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin: 6px 0;
    }
    .row > label { font-size: 13px; }
    .row input[type="number"] {
      width: 88px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
    }
    .row input[type="range"] { width: 100%; }
    .pair {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 8px;
      align-items: center;
    }
    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .cmd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .cmd-grid button { width: 100%; }
    .transform-rows {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .transform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .transform-row-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 44px;
      letter-spacing: 0.01em;
    }
    .transform-pair {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }
    .transform-pair button {
      min-width: 62px;
      padding: 4px 6px;
      font-size: 11px;
      line-height: 1.15;
    }
    button {
      border: 1px solid #9cb4ac;
      background: #e8f4f1;
      color: #000000;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: #000000;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin: 8px 0 4px;
      line-height: 1.4;
    }
    .status {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      min-height: 72px;
    }
    svg { width: 100%; height: 100%; display: block; touch-action: none; }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 58vh 42vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="viewer" id="viewer">
      <svg id="svgRoot" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="viewportClip"><rect id="clipRect" x="0" y="0" width="100" height="100" /></clipPath>
        </defs>
        <rect id="bgRect" x="0" y="0" width="100%" height="100%" fill="#ffffff" />
        <g id="viewportGroup" clip-path="url(#viewportClip)">
            <g id="sceneGroup">
              <g id="polyLayer"></g>
              <g id="lineLayer"></g>
            </g>
            <g id="pointLayer"></g>
          </g>
        </svg>
    </div>

    <aside class="panel">
      <div class="section">
        <div class="input-actions">
          <button id="pasteBtn" class="secondary">Вставить</button>
          <button id="exportBtn" class="secondary">Экспорт SVG</button>
        </div>
        <textarea id="inputLog" spellcheck="false" placeholder="#LINES_BEGIN\nm,b\n-28.3,-15.8\n...\n#LINES_END\n\nили\n[(-17.5,-25.7), (-8.02,3.97), ...]"></textarea>
        <div class="buttons">
          <button id="parseBtn">Распарсить</button>
          <button id="fitBtn" class="secondary">Fit</button>
          <button id="resetViewBtn" class="secondary">Reset View</button>
        </div>
      </div>

      <div class="section">
        <h2>Режим</h2>
        <div class="buttons">
          <label><input type="checkbox" id="checkerMode" checked /> Шахматная раскраска</label>
          <label><input type="checkbox" id="coloredMode" /> Цветные</label>
          <label><input type="checkbox" id="showOuter" checked /> Внешние области</label>
          <label><input type="checkbox" id="showPoints" /> Точки</label>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2>Geometry Transform</h2>
          <div class="section-head-buttons">
            <button id="autoTransformBtn" class="secondary">Auto</button>
            <button id="resetTransformBtn" class="secondary">Reset</button>
          </div>
        </div>
        <div class="transform-rows">
          <div class="transform-row">
            <span class="transform-row-label">Rotate</span>
            <div class="transform-pair">
              <button id="rotLeftBtn" class="secondary">↺ -10°</button>
              <button id="rotRightBtn" class="secondary">↻ +10°</button>
            </div>
          </div>
          <div class="transform-row">
            <span class="transform-row-label">Scale</span>
            <div class="transform-pair">
              <button id="stretchXDownBtn" class="secondary">X -10%</button>
              <button id="stretchXUpBtn" class="secondary">X +10%</button>
              <button id="stretchYDownBtn" class="secondary">Y -10%</button>
              <button id="stretchYUpBtn" class="secondary">Y +10%</button>
            </div>
          </div>
          <div class="transform-row">
            <span class="transform-row-label">Skew</span>
            <div class="transform-pair">
              <button id="skewXLeftBtn" class="secondary">Kx -6°</button>
              <button id="skewXRightBtn" class="secondary">Kx +6°</button>
              <button id="skewYDownBtn" class="secondary">Ky -6°</button>
              <button id="skewYUpBtn" class="secondary">Ky +6°</button>
            </div>
          </div>
          <div class="transform-row">
            <span class="transform-row-label">Mirror</span>
            <div class="transform-pair">
              <button id="mirrorXBtn" class="secondary">X</button>
              <button id="mirrorYBtn" class="secondary">Y</button>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Статус</h2>
        <div id="status" class="status"></div>
      </div>
    </aside>
  </div>

  <script src="js/state.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/cells.js"></script>
  <script src="js/matrix.js"></script>
  <script src="js/render.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
